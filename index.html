<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代卡漫：量詞粵語大冒險 ⚔️ 🗣️</title>
    <style>
        /* 漫畫風趣味背景 */
        body {
            font-family: 'Comic Sans MS', 'Segoe UI', "Microsoft JhengHei", "PingFang HK", sans-serif;
            background-color: #fcd68a;
            background-image: radial-gradient(#e5ab5e 20%, transparent 20%), radial-gradient(#e5ab5e 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* 漫畫格大容器 */
        .comic-container {
            background-color: #fffdf0;
            border: 6px solid #4a2306;
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 680px;
            box-shadow: 12px 12px 0px #4a2306;
            text-align: center;
            position: relative;
        }
        
        /* 爆發效果的卡漫標題 */
        h1 {
            color: #fff;
            background-color: #e63946;
            border: 4px solid #4a2306;
            padding: 12px 25px;
            font-size: 28px;
            border-radius: 15px;
            display: inline-block;
            transform: rotate(-1deg);
            box-shadow: 5px 5px 0px #4a2306;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        /* 語音狀態提示條 */
        .voice-status {
            background-color: #eef1f6;
            border: 2px solid #4a2306;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 15px;
            font-weight: bold;
            color: #4a2306;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        /* 古風計分板 */
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 900;
            color: #4a2306;
            background: #fcd68a;
            padding: 10px 20px;
            border: 3px solid #4a2306;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        /* 經驗值進度條 */
        .progress-container {
            background-color: #fff;
            border: 3px solid #4a2306;
            border-radius: 15px;
            height: 22px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.15);
        }
        .progress-bar {
            background-color: #ff9f1c;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 卡通人物舞台區 */
        .character-stage {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            background: #fff;
            border: 4px solid #4a2306;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 5px 5px 0px #e5ab5e;
        }
        
        /* Q版卡通頭像 */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #4a2306;
            background-color: #ffdda1;
            font-size: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 4px 4px 0px #4a2306;
            cursor: pointer;
        }
        .avatar:hover {
            transform: scale(1.05);
        }
        
        /* 漫畫台詞泡泡框 */
        .comic-bubble {
            background: #fff;
            border: 4px solid #4a2306;
            border-radius: 18px;
            padding: 18px;
            position: relative;
            flex-grow: 1;
            font-size: 21px;
            font-weight: bold;
            color: #222;
            text-align: left;
            line-height: 1.6;
            min-height: 60px;
        }
        .comic-bubble::after, .comic-bubble::before {
            right: 100%;
            top: 50%;
            border: solid transparent;
            content: " ";
            height: 0;
            width: 0;
            position: absolute;
            pointer-events: none;
        }
        .comic-bubble::after {
            border-color: rgba(255, 255, 255, 0);
            border-right-color: #fff;
            border-width: 12px;
            margin-top: -12px;
        }
        .comic-bubble::before {
            border-color: rgba(74, 35, 6, 0);
            border-right-color: #4a2306;
            border-width: 17px;
            margin-top: -17px;
        }
        
        /* 四格漫畫選項排版 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .comic-btn {
            background-color: #aae0ec;
            border: 4px solid #4a2306;
            border-radius: 15px;
            padding: 18px;
            font-size: 22px;
            font-weight: 900;
            color: #4a2306;
            cursor: pointer;
            box-shadow: 5px 5px 0px #4a2306;
            transition: all 0.1s ease;
        }
        .comic-btn:hover {
            background-color: #8cd3e2;
            transform: translateY(-2px);
            box-shadow: 7px 7px 0px #4a2306;
        }
        .comic-btn:active {
            transform: translateY(5px);
            box-shadow: 0px 0px 0px #4a2306;
        }
        
        .comic-btn.correct {
            background-color: #87e293 !important;
            color: #0d4b15;
        }
        .comic-btn.wrong {
            background-color: #ff8b8b !important;
            color: #5c0909;
        }
        
        .feedback-zone {
            margin-top: 25px;
            font-size: 26px;
            font-weight: 900;
            height: 40px;
        }
        
        .start-screen-btn {
            background-color: #e63946;
            color: white;
            border: 4px solid #4a2306;
            padding: 20px 50px;
            font-size: 28px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 6px 6px 0px #4a2306;
            margin: 40px auto;
        }
        
        .restart-btn {
            background-color: #ffbe0b;
            color: #4a2306;
            border: 4px solid #4a2306;
            padding: 15px 45px;
            font-size: 26px;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 5px 5px 0px #4a2306;
            margin-top: 25px;
            display: none;
        }
    </style>
</head>
<body>

<div class="comic-container">
    <h1>⚔️ 古代卡漫：量詞廣東話大冒險 🗣️</h1>
    
    <div id="start-screen">
        <p style="font-size: 20px; font-weight: bold; color: #4a2306; line-height: 1.8;">
            歡迎來到古代漫畫世界！<br>
            本遊戲內置<span style="color: #e63946;">【可愛溫柔粵語人聲讀題】</span>，陪小朋友一齊聽住學！<br>
            請點擊下方按鈕開啟冒險！
        </p>
        <button class="start-screen-btn" onclick="initGame()">開啟冒險 🚀</button>
    </div>
    
    <div id="game-ui" style="display: none;">
        <div class="voice-status">
            <span>🔊 聽唔清？點擊左邊嘅卡通頭像就可以「重新聽題」喇！</span>
        </div>

        <div class="score-board">
            <span id="question-number">第 1 / 100 關</span>
            <span id="role-name" style="color:#e63946;">登場人物：大將軍</span>
            <span id="score">得分：0</span>
        </div>
        
        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>
        
        <div class="character-stage">
            <div id="avatar" class="avatar" onclick="speakCurrentQuestion()" title="點我重新讀題">🤠</div>
            <div id="question" class="comic-bubble">已經準備好古風卷軸...</div>
        </div>
        
        <div class="options-grid">
            <button class="comic-btn" onclick="checkAnswer(0)" id="opt0">A</button>
            <button class="comic-btn" onclick="checkAnswer(1)" id="opt1">B</button>
            <button class="comic-btn" onclick="checkAnswer(2)" id="opt2">C</button>
            <button class="comic-btn" onclick="checkAnswer(3)" id="opt3">D</button>
        </div>
        
        <div id="feedback" class="feedback-zone"></div>
    </div>

    <button id="restart-btn" class="restart-btn" onclick="startGame()">再次穿越 🔄</button>
</div>

let currentQuestionIndex = 0;
let score = 0;
let currentQuiz = [];
let canAnswer = true;
let cantoneseVoice = null;

// 初始化廣東話語音引擎
function initCantoneseVoice() {
    if ('speechSynthesis' in window) {
        const loadVoices = () => {
            const voices = window.speechSynthesis.getVoices();
            // 嚴格篩選香港廣東話女性/可愛音調語音 (zh-HK)
            cantoneseVoice = voices.find(v => v.lang.replace('_', '-').toLowerCase() === 'zh-hk' || v.lang.toLowerCase().includes('hk')) ||
                             voices.find(v => v.lang.toLowerCase().includes('zh')) || 
                             voices[0];
        };
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    }
}

// 播放廣東話伴讀
function speakCantonese(text) {
    if ('speechSynthesis' in window && cantoneseVoice) {
        window.speechSynthesis.cancel(); // 清除排隊中的語音
        
        // 為了讓廣東話讀起來更自然，將題目中書面語的「一（）」空格，智慧轉換成廣東話語音「一乜嘢」
        let spokenText = text.replace(/一（）/g, "一乜嘢");
        spokenText = spokenText.replace(/（）（）/g, "乜嘢乜嘢");
        
        let utterance = new SpeechSynthesisUtterance(spokenText);
        utterance.voice = cantoneseVoice;
        utterance.pitch = 1.25; // 提高音調（呈現可愛大姐姐/小朋友聲音）
        utterance.rate = 0.92;  // 略微放慢語速，方便小朋友聽得清晰
        window.speechSynthesis.speak(utterance);
    }
}

function initGame() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-ui").style.display = "block";
    initCantoneseVoice();
    startGame();
}

// 洗牌演算法（將100題隨機打亂，每次玩的順序都不同）
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    currentQuestionIndex = 0;
    score = 0;
    currentQuiz = shuffle([...quizData]);
    document.getElementById("restart-btn").style.display = "none";
    updateScore();
    loadQuestion();
}

function loadQuestion() {
    canAnswer = true;
    document.getElementById("feedback").innerText = "";
    
    for (let i = 0; i < 4; i++) {
        let btn = document.getElementById("opt" + i);
        btn.className = "comic-btn";
    }

    let qData = currentQuiz[currentQuestionIndex];
    document.getElementById("question").innerText = qData.q;
    
    // 隨機更換古代卡漫發問人物
    let randomChar = characters[Math.floor(Math.random() * characters.length)];
    document.getElementById("avatar").innerText = randomChar.avatar;
    document.getElementById("role-name").innerText = `登場：${randomChar.name}`;
    
    let shuffledOptions = shuffle([...qData.o]);
    for (let i = 0; i < 4; i++) {
        let btn = document.getElementById("opt" + i);
        btn.innerText = shuffledOptions[i];
    }
    
    document.getElementById("question-number").innerText = `第 ${currentQuestionIndex + 1} / ${currentQuiz.length} 關`;
    let progressPercent = ((currentQuestionIndex) / currentQuiz.length) * 100;
    document.getElementById("progress").style.width = progressPercent + "%";
    
    // 載入題目時自動觸發廣東話語音伴讀
    setTimeout(() => {
        speakCurrentQuestion();
    }, 200);
}

function speakCurrentQuestion() {
    let qData = currentQuiz[currentQuestionIndex];
    if (qData) {
        speakCantonese(qData.q);
    }
}

function checkAnswer(selectedIndex) {
    if (!canAnswer) return;
    canAnswer = false;

    let qData = currentQuiz[currentQuestionIndex];
    let selectedBtn = document.getElementById("opt" + selectedIndex);
    let selectedText = selectedBtn.innerText;
    
    let correctIndex = -1;
    for(let i=0; i<4; i++) {
        if(document.getElementById("opt" + i).innerText === qData.a) {
            correctIndex = i;
        }
    }

    if (selectedText === qData.a) {
        score += 10;
        selectedBtn.classList.add("correct");
        document.getElementById("feedback").innerHTML = "<span style='color: #2b933b; font-weight:900;'>🎯 叮咚！答對咗喇！你好犀利啊！</span>";
        speakCantonese("好棒拓！你答對咗喇！");
    } else {
        selectedBtn.classList.add("wrong");
        document.getElementById("opt" + correctIndex).classList.add("correct");
        document.getElementById("feedback").innerHTML = `<span style='color: #d84b16; font-weight:900;'>💥 哎呀！正確答案應該係「${qData.a}」！</span>`;
        speakCantonese(`唔啱喔，正確答案係 ${qData.a}`);
    }

    updateScore();

    // 延時 2.2 秒後換下一題，預留語音播報反饋的時間
    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuiz.length) {
            loadQuestion();
        } else {
            endGame();
        }
    }, 2200);
}

function updateScore() {
    document.getElementById("score").innerText = "積分：" + score;
}

function endGame() {
    document.getElementById("progress").style.width = "100%";
    document.getElementById("game-ui").style.display = "none";
    
    let finalFeedback = "";
    if (score >= 900) {
        finalFeedback = `👑 哇！你足足攞到 ${score} 分啊！黃上封你為「大內量詞一品文豪狀元」！🥇`;
    } else if (score >= 600) {
        finalFeedback = `⚔️ 很好！你攞到 ${score} 分！武功高強，你已經係「江湖量詞武林大俠」喇！🥈`;
    } else {
        finalFeedback = `📜 再接再厲！你得到 ${score} 分！返去私塾跟夫子多讀書，下次一定可以金榜題名！🥉`;
    }
    
    document.getElementById("avatar").innerText = "👑";
    document.getElementById("role-name").innerText = "冒險終點";
    document.getElementById("question").innerText = finalFeedback;
    document.getElementById("restart-btn").style.display = "inline-block";
    
    speakCantonese("恭喜你完成全套大冒險！" + finalFeedback);
}
